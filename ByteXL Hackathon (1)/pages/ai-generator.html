<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Generator | QuizVerse</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark">
    <div class="dashboard-container">
        <!-- Sidebar Copy -->
        <aside class="sidebar glass-effect">
            <div class="sidebar-header">
                <a href="../index.html" class="logo"><span class="text-gradient">Quiz</span>Verse</a>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
                <a href="ai-generator.html" class="active"><i class="fas fa-robot"></i> AI Generator</a>
                <a href="battle.html"><i class="fas fa-swords"></i> Multiplayer</a>
                <a href="leaderboard.html"><i class="fas fa-trophy"></i> Leaderboard</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="ai-config-container">
                <div class="section-header">
                    <h1>AI Quiz <span class="text-gradient">Architect</span></h1>
                    <p>Leverage the power of Groq AI to build your personalized learning path.</p>
                </div>

                <div class="ai-form glass-effect">
                    <div class="form-group">
                        <label>What do you want to learn today?</label>
                        <input type="text" id="ai-topic-input" placeholder="e.g. Advanced React Hooks, Quantum Computing, World War II">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Difficulty</label>
                            <select id="ai-difficulty">
                                <option value="beginner">Beginner</option>
                                <option value="intermediate">Intermediate</option>
                                <option value="expert">Expert</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Number of Questions</label>
                            <input type="number" id="ai-count" value="5" min="3" max="15">
                        </div>
                    </div>

                    <div class="api-key-notice glass-effect">
                        <i class="fas fa-key"></i>
                        <p>This feature requires a <strong>Groq API Key</strong>. Add it to <code>js/ai-generator.js</code> to enable AI generation.</p>
                    </div>

                    <button class="btn btn-primary btn-xl shadow-glow" id="start-ai-gen">
                        Generate AI Quiz <i class="fas fa-sparkles"></i>
                    </button>
                </div>

                <div id="ai-loading" class="ai-loading-screen" style="display: none;">
                    <div class="loader"></div>
                    <p id="loading-text">Consulting the AI Architect...</p>
                </div>
            </div>
        </main>
    </div>

    <style>
        .ai-config-container { max-width: 800px; margin: 0 auto; }
        .ai-form { padding: 40px; margin-top: 30px; display: flex; flex-direction: column; gap: 25px; }
        .form-group { display: flex; flex-direction: column; gap: 10px; }
        .form-group label { font-weight: 600; color: var(--text-gray); }
        .form-group input, .form-group select {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .api-key-notice {
            padding: 15px;
            background: rgba(245, 158, 11, 0.1);
            border-color: rgba(245, 158, 11, 0.3);
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.9rem;
        }
        .ai-loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .loader {
            width: 80px;
            height: 80px;
            border: 5px solid var(--glass-border);
            border-top: 5px solid var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script type="module" src="../js/ai-generator.js"></script>
</body>
</html>
