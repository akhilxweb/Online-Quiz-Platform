<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | QuizVerse</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-darker">
    <div style="height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="glass-effect animate-fade-in" style="width: 100%; max-width: 450px; padding: 50px; border-radius: var(--radius-lg); text-align: center;">
            <div class="logo" style="font-size: 3rem; margin-bottom: 10px;"><span class="text-gradient">Quiz</span>Verse</div>
            <h2 style="font-size: 1.8rem; margin-bottom: 30px;">Create Your Account</h2>

            <form id="register-form">
                <div style="text-align: left; margin-bottom: 24px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Full Name</label>
                    <input type="text" id="reg-name" class="form-control" placeholder="Warrior Name" required>
                </div>
                <div style="text-align: left; margin-bottom: 24px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Email Address</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="warrior@example.com" required>
                </div>
                <div style="text-align: left; margin-bottom: 24px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" style="justify-content: center; margin-top: 10px;">
                    Join the Arena <i class="fas fa-user-plus"></i>
                </button>
            </form>

            <p style="text-align: center; margin-top: 30px; color: var(--text-muted); font-size: 0.9rem;">
                Already have an account? <a href="login.html" class="text-gradient" style="font-weight: 700; text-decoration: none;">Login</a>
            </p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
