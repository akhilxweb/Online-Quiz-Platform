<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - QuizBattle</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .profile-main { padding: 100px 0; }
        .profile-container { max-width: 800px; margin: 0 auto; }
        .profile-card { padding: 3rem; border-radius: 24px; text-align: center; }
        .profile-avatar { width: 120px; height: 120px; background: var(--glass-bg); border: 2px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 0 auto 1.5rem; }
        .profile-info h1 { margin-bottom: 0.5rem; color: var(--text-primary); }
        .profile-info p { color: var(--text-secondary); margin-bottom: 2rem; }
        .profile-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { padding: 1.5rem; border-radius: 16px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); }
        .stat-card .value { display: block; font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .stat-card .label { font-size: 0.85rem; color: var(--text-secondary); }
        .profile-actions { display: flex; gap: 1rem; justify-content: center; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-content">
                <div class="logo"><i class="fas fa-brain"></i> <span>QuizBattle</span></div>
                <ul class="nav-links">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="quiz-categories.html">Quizzes</a></li>
                    <li><a href="quiz-generator.html">AI Generator</a></li>
                    <li><a href="battle-room.html">Battle</a></li>
                    <li><a href="leaderboard.html">Leaderboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="profile-main">
        <div class="container">
            <div class="profile-container">
                <div class="profile-card glass-effect">
                    <div class="profile-avatar">👤</div>
                    <div class="profile-info">
                        <h1 id="profName">Player</h1>
                        <p id="profEmail">player@example.com</p>
                    </div>
                    <div class="profile-stats">
                        <div class="stat-card">
                            <span class="value" id="profLevel">1</span>
                            <span class="label">Current Level</span>
                        </div>
                        <div class="stat-card">
                            <span class="value" id="profXP">0</span>
                            <span class="label">Total XP</span>
                        </div>
                        <div class="stat-card">
                            <span class="value" id="profQuizzes">0</span>
                            <span class="label">Quizzes Finished</span>
                        </div>
                    </div>
                    <div class="profile-actions">
                        <button class="btn btn-primary" onclick="alert('Profile editing coming soon!')">Edit Profile</button>
                        <button class="btn btn-outline" onclick="location.href='dashboard.html'">Back to Dashboard</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userData = JSON.parse(localStorage.getItem('user')) || {};
            const stats = userData.stats || { level: 1, xp: 0, totalQuizzes: 0 };
            
            document.getElementById('profName').textContent = userData.username || userData.fullname || 'Player';
            document.getElementById('profEmail').textContent = userData.email || 'player@example.com';
            document.getElementById('profLevel').textContent = stats.level;
            document.getElementById('profXP').textContent = stats.xp.toLocaleString();
            document.getElementById('profQuizzes').textContent = stats.totalQuizzes;
        });
    </script>
</body>
</html>
