<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards | QUIZWARTS</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/main.css">
    
    <style>
        .fc-container { display: flex; flex-direction: column; align-items: center; margin-top: 40px; }
        .fc-card { width: 100%; max-width: 500px; height: 300px; perspective: 1000px; cursor: pointer; }
        .fc-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.175,0.885,0.32,1.275); transform-style: preserve-3d; }
        .fc-card.flipped .fc-inner { transform: rotateY(180deg); }
        .fc-front, .fc-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 24px; }
        .fc-back { transform: rotateY(180deg); border-color: var(--neon-cyan); }
        .fc-badge { position: absolute; top: 16px; left: 16px; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; }
        .fc-controls { display: flex; align-items: center; gap: 24px; margin-top: 40px; }
        #fc-q, #fc-a { font-size: 1.5rem; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <canvas id="particle-canvas"></canvas>
    <div class="bg-orbs">
        <div class="neon-orb orb-2"></div>
        <div class="neon-orb orb-3"></div>
    </div>

    <header class="topbar" id="app-topbar"></header>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 class="font-orbitron">Flashcards</h1>
                <p class="text-muted">Tap to flip. Master the concepts.</p>
            </div>
            <a href="dashboard.html" class="btn-ghost" onclick="sfxClick()"><i class="ph-bold ph-arrow-left"></i> Back</a>
        </div>

        <div class="fc-container">
            <div class="fc-card" id="fc-card">
                <div class="fc-inner">
                    <div class="fc-front glass-panel">
                        <span class="fc-badge">QUESTION</span>
                        <h2 id="fc-q">Loading...</h2>
                    </div>
                    <div class="fc-back glass-panel" style="box-shadow: 0 0 30px rgba(0,243,255,0.2);">
                        <span class="fc-badge text-neon-cyan">ANSWER</span>
                        <h2 id="fc-a" class="text-neon-cyan">Loading...</h2>
                    </div>
                </div>
            </div>
            <div class="fc-controls">
                <button class="btn-neon" id="fc-prev"><i class="ph-bold ph-arrow-left"></i></button>
                <span id="fc-count" class="font-orbitron" style="font-size:1.2rem;">1 / 10</span>
                <button class="btn-neon" id="fc-next"><i class="ph-bold ph-arrow-right"></i></button>
            </div>
        </div>
    </main>

    <script src="js/db.js"></script>
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requireAuth();
            
            let fcIdx = 0;
            const card = document.getElementById('fc-card');
            const qEl = document.getElementById('fc-q');
            const aEl = document.getElementById('fc-a');
            const countEl = document.getElementById('fc-count');

            function loadFC() {
                card.classList.remove('flipped');
                setTimeout(() => {
                    qEl.textContent = FLASHCARDS[fcIdx].q;
                    aEl.textContent = FLASHCARDS[fcIdx].a;
                    countEl.textContent = `${fcIdx+1} / ${FLASHCARDS.length}`;
                }, 150);
            }

            card.addEventListener('click', () => {
                sfxClick();
                card.classList.toggle('flipped');
            });

            document.getElementById('fc-prev').addEventListener('click', () => {
                sfxClick();
                if(fcIdx > 0) { fcIdx--; loadFC(); }
            });

            document.getElementById('fc-next').addEventListener('click', () => {
                sfxClick();
                if(fcIdx < FLASHCARDS.length - 1) { fcIdx++; loadFC(); }
            });

            loadFC();
        });
    </script>
</body>
</html>
