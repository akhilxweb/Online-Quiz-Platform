<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Arena | QuizVerse</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .quiz-header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-radius: var(--radius-lg); }
        #timer { font-weight: 800; font-size: 1.2rem; }
        .question-card { padding: 50px; border-radius: var(--radius-lg); max-width: 800px; margin: 0 auto; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
        .option-btn { padding: 24px; text-align: left; font-size: 1.1rem; background: transparent; border: 2px solid var(--primary); color: white; transition: 0.3s; }
        .option-btn.correct { background: #10b981 !important; border-color: #10b981 !important; }
        .option-btn.wrong { background: #ef4444 !important; border-color: #ef4444 !important; }
        .progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--grad-primary); width: 0%; transition: 0.3s; }
    </style>
</head>
<body class="bg-darker" style="padding: 40px;">
    <div id="quiz-area">
        <header class="quiz-header glass-effect animate-fade-in">
            <h2 id="active-category">Quiz</h2>
            <div style="display: flex; gap: 30px;">
                <div><i class="fas fa-clock"></i> <span id="timer-val">30</span>s</div>
                <div>Score: <span id="current-score" class="text-gradient">0</span></div>
            </div>
        </header>
        <div class="progress-bar"><div class="progress-fill" id="quiz-progress"></div></div>
        <main class="animate-fade-in" style="margin-top: 40px;">
            <div id="quiz-card" class="question-card glass-effect">
                <h2 id="question-text" style="font-size: 2.2rem; margin-bottom: 40px;">Loading...</h2>
                <div class="options-grid" id="options-container"></div>
                <button id="next-btn" class="btn btn-primary" style="display: none; margin-top: 40px; float: right;">Next Question</button>
            </div>
            <div id="results-screen" class="glass-effect" style="display: none; padding: 60px; text-align: center; border-radius: var(--radius-lg);">
                <h1 style="font-size: 3rem;">Quiz Completed!</h1>
                <div id="final-score-display" style="font-size: 4rem; font-weight: 900; margin: 30px 0;">0</div>
                <button onclick="location.reload()" class="btn btn-primary">Try Again</button>
                <a href="dashboard.html" class="btn btn-outline">Dashboard</a>
            </div>
        </main>
    </div>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/quiz-engine.js"></script>
</body>
</html>
