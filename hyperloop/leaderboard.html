<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | QUIZWARTS</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/main.css">
    
    <style>
        .lb-header { display: grid; grid-template-columns: 60px 1fr 100px; padding: 16px 24px; border-bottom: 1px solid var(--panel-border); font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .lb-list { display: flex; flex-direction: column; }
        .lb-row { display: grid; grid-template-columns: 60px 1fr 100px; padding: 16px 24px; border-bottom: 1px solid var(--panel-border); align-items: center; font-weight: 600; transition: background 0.2s; }
        .lb-row:last-child { border-bottom: none; }
        .lb-row:hover { background: rgba(255,255,255,0.02); }
        .lb-row.you { background: rgba(59,130,246,0.1); border-left: 3px solid var(--neon-blue); }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <canvas id="particle-canvas"></canvas>
    <div class="bg-orbs">
        <div class="neon-orb orb-1"></div>
        <div class="neon-orb orb-3"></div>
    </div>

    <header class="topbar" id="app-topbar"></header>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 class="font-orbitron">Global Rankings</h1>
                <p class="text-muted">The best of the best.</p>
            </div>
            <a href="dashboard.html" class="btn-ghost" onclick="sfxClick()"><i class="ph-bold ph-arrow-left"></i> Back</a>
        </div>

        <div class="glass-panel p-0 overflow-hidden">
            <div class="lb-header">
                <div>Rank</div><div>Player</div><div class="text-right">XP</div>
            </div>
            <div class="lb-list" id="lb-list">
                <!-- Injected -->
            </div>
        </div>
    </main>

    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requireAuth();
            
            const list = document.getElementById('lb-list');
            const users = [
                {name:'Marie', xp:2450}, {name:'Sarah', xp:1840}, 
                {name:'David', xp:1200}, {name:'Alex', xp:980}, 
                {name:'Zara', xp:720}
            ];
            
            users.push({name: state.user || 'You', xp: state.xp, you: true});
            users.sort((a,b) => b.xp - a.xp);
            
            users.forEach((u,i) => {
                const row = document.createElement('div');
                row.className = 'lb-row' + (u.you ? ' you' : '');
                
                const av = u.you && state.avatar ? state.avatar : `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(u.name)}`;
                
                let rankDisplay = `#${i+1}`;
                if(i===0) rankDisplay = '🥇';
                if(i===1) rankDisplay = '🥈';
                if(i===2) rankDisplay = '🥉';

                row.innerHTML = `
                <div class="font-orbitron" style="font-size:1.1rem">${rankDisplay}</div>
                <div style="display:flex;align-items:center;gap:12px;">
                    <img src="${av}" style="width:36px;height:36px;border-radius:50%;border:1px solid ${u.you ? 'var(--neon-cyan)' : 'var(--panel-border)'}">
                    <span>${u.name} ${u.you ? '(You)' : ''}</span>
                </div>
                <div class="text-right text-neon-blue font-orbitron">${u.xp}</div>
                `;
                list.appendChild(row);
            });
        });
    </script>
</body>
</html>
