<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Nexus | QuizVerse</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ai-primary: #0ea5e9;
            --ai-secondary: #a855f7;
            --ai-bg: #020617;
            --glow: 0 0 20px rgba(14, 165, 233, 0.4);
        }

        .ai-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: calc(100vh - 120px);
            gap: 24px;
        }

        .ai-sidebar { display: flex; flex-direction: column; gap: 20px; }

        .history-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }

        .history-item {
            padding: 12px 16px; border-radius: var(--radius-md); background: rgba(255,255,255,0.03);
            font-size: 0.85rem; cursor: pointer; transition: 0.3s; border: 1px solid transparent;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .history-item:hover { background: rgba(255,255,255,0.08); border-color: var(--ai-primary); }

        /* Mode Selection */
        .mode-card {
            padding: 12px 16px; border-radius: var(--radius-md); background: rgba(255,255,255,0.03);
            font-size: 0.85rem; cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 10px;
        }
        .mode-card:hover { background: rgba(255,255,255,0.08); transform: scale(1.02); }
        .mode-card.active {
            background: rgba(14, 165, 233, 0.15); border-color: var(--ai-primary);
            box-shadow: var(--glow); font-weight: 700;
        }
        .mode-card.active i { color: var(--ai-primary); animation: pulse-glow 2s infinite; }

        @keyframes pulse-glow {
            0% { text-shadow: 0 0 5px var(--ai-primary); }
            50% { text-shadow: 0 0 15px var(--ai-primary); }
            100% { text-shadow: 0 0 5px var(--ai-primary); }
        }

        /* Chat Window */
        .chat-container {
            display: flex; flex-direction: column; background: rgba(255,255,255,0.02);
            border-radius: var(--radius-lg); border: 1px solid rgba(255,255,255,0.05);
            position: relative; overflow: hidden;
        }

        .messages-area {
            flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px;
        }

        .message {
            max-width: 80%; padding: 16px 24px; border-radius: var(--radius-md);
            line-height: 1.6; position: relative; animation: slideUp 0.4s ease-out;
        }
        .msg-user { align-self: flex-end; background: var(--grad-primary); border-bottom-right-radius: 4px; }
        .msg-ai { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }

        /* Input Area */
        .ai-input-wrapper {
            padding: 20px 30px 30px; background: rgba(15, 23, 42, 0.9);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .attachment-preview {
            display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
            padding: 8px 16px; background: rgba(255,255,255,0.05); border-radius: 12px;
            width: fit-content; animation: slideUp 0.3s;
        }

        .input-box {
            display: flex; gap: 12px; background: rgba(255,255,255,0.03);
            padding: 8px 12px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s; align-items: center;
        }
        .input-box:focus-within { border-color: var(--ai-primary); box-shadow: var(--glow); }

        .input-box input {
            flex-grow: 1; background: transparent; border: none; color: white;
            padding: 10px; font-size: 1rem;
        }
        .input-box input:focus { outline: none; }

        .action-btn {
            width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; cursor: pointer; transition: 0.3s; color: var(--text-muted);
            background: transparent; border: none; font-size: 1.1rem;
        }
        .action-btn:hover { background: rgba(255,255,255,0.08); color: white; }
        .action-btn.active-voice { background: var(--danger); color: white; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--ai-primary); }

        /* Ripple Effect */
        .ripple {
            position: absolute; border-radius: 50%; transform: scale(0);
            animation: ripple-anim 0.6s linear; background: rgba(255,255,255,0.3);
            pointer-events: none;
        }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        /* Mobile Adjustments */
        @media (max-width: 900px) {
            .ai-layout { grid-template-columns: 1fr; }
            .ai-sidebar { display: none; }
        }
    </style>
</head>
<body class="bg-darker">
    
    <div class="ai-layout">
        <!-- Sidebar -->
        <aside class="ai-sidebar animate-fade-in">
            <button class="btn btn-primary w-100" style="justify-content: center;" onclick="newChat()">
                <i class="fas fa-plus"></i> New Session
            </button>

            <div class="glass-effect" style="padding: 20px; border-radius: var(--radius-lg);">
                <h4 style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;">AI Neural Modes</h4>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <div class="mode-card active" onclick="setMode('turbo', this)">
                        <i class="fas fa-rocket"></i>
                        <span>Turbo Mode (Llama 3)</span>
                    </div>
                    <div class="mode-card" onclick="setMode('study', this)">
                        <i class="fas fa-brain"></i>
                        <span>Study Buddy (Quizzes)</span>
                    </div>
                    <div class="mode-card" onclick="setMode('code', this)">
                        <i class="fas fa-code"></i>
                        <span>Code Architect</span>
                    </div>
                </div>
            </div>

            <div class="history-list" id="chat-history">
                <!-- History Items -->
            </div>

            <button class="btn btn-outline btn-sm w-100" style="justify-content: center; opacity: 0.6;" onclick="clearHistory()">
                <i class="fas fa-trash-alt"></i> Wipe Neural Memory
            </button>
        </aside>

        <!-- Main Chat -->
        <div class="chat-container animate-fade-in">
            <div id="messages-area" class="messages-area">
                <div class="message msg-ai">
                    <div style="font-weight: 800; color: var(--ai-primary); margin-bottom: 8px;">NEXUS CORE v3.0</div>
                    Welcome to the Nexus. Neural link established. **Turbo Mode** is currently active. How can I assist?
                </div>
            </div>

            <!-- UI Indicators -->
            <div id="typing-indicator" class="hidden" style="margin-left: 40px; margin-bottom: 10px;">
                <div style="display: flex; gap: 5px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 20px; width: fit-content;">
                    <div class="dot" style="width:6px;height:6px;background:var(--ai-primary);border-radius:50%;animation:bounce 1.4s infinite"></div>
                    <div class="dot" style="width:6px;height:6px;background:var(--ai-primary);border-radius:50%;animation:bounce 1.4s infinite 0.2s"></div>
                    <div class="dot" style="width:6px;height:6px;background:var(--ai-primary);border-radius:50%;animation:bounce 1.4s infinite 0.4s"></div>
                </div>
            </div>

            <div class="ai-input-wrapper">
                <div id="attachment-area"></div>
                <div class="input-box">
                    <input type="file" id="file-picker" style="display: none;" onchange="handleFileSelect(this)">
                    <button class="action-btn" onclick="document.getElementById('file-picker').click()" title="Attach File">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    
                    <button class="action-btn" id="btn-voice" onclick="toggleVoice()" title="Voice Input">
                        <i class="fas fa-microphone"></i>
                    </button>

                    <input type="text" id="ai-input" placeholder="Message Nexus Core..." autocomplete="off">
                    
                    <button class="action-btn btn-primary" id="btn-send-ai" style="background: var(--ai-primary); color: white; width: 45px; height: 45px;">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div id="status-bar" style="margin-top: 10px; font-size: 0.75rem; color: var(--text-muted); display: flex; justify-content: space-between;">
                    <span id="voice-status">System Standby</span>
                    <span id="mode-status">Turbo Mode Active</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/firebase-config.js"></script>
    <script src="../js/shell.js"></script>
    <script src="../js/ai-buddy.js"></script>
</body>
</html>
