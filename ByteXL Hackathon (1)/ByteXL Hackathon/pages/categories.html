<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories | QuizVerse</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .cat-card { padding: 40px; border-radius: var(--radius-lg); cursor: pointer; transition: 0.3s; text-align: center; }
        .cat-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .cat-icon { font-size: 3rem; margin-bottom: 20px; color: var(--primary); }
    </style>
</head>
<body class="bg-darker">
    <h1 style="margin-bottom: 10px;">Explore <span class="text-gradient">Categories</span></h1>
    <p style="color: var(--text-muted); margin-bottom: 40px;">Select a subject to begin your mastery journey.</p>

    <div class="cat-grid">
        <div class="cat-card glass-effect animate-fade-in" onclick="openDifficulty('javascript')">
            <i class="fab fa-js cat-icon" style="color: #f7df1e;"></i>
            <h3>JavaScript</h3>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-top: 10px;">Web Logic & Interactivity</p>
        </div>
        <div class="cat-card glass-effect animate-fade-in" style="animation-delay: 0.1s;" onclick="openDifficulty('python')">
            <i class="fab fa-python cat-icon" style="color: #3776ab;"></i>
            <h3>Python</h3>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-top: 10px;">Data & Automation</p>
        </div>
        <div class="cat-card glass-effect animate-fade-in" style="animation-delay: 0.2s;" onclick="openDifficulty('sql')">
            <i class="fas fa-database cat-icon" style="color: #4479a1;"></i>
            <h3>Databases</h3>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-top: 10px;">SQL & Data Architecture</p>
        </div>
        <div class="cat-card glass-effect animate-fade-in" style="animation-delay: 0.3s;" onclick="openDifficulty('react')">
            <i class="fab fa-react cat-icon" style="color: #61dafb;"></i>
            <h3>React.js</h3>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-top: 10px;">Modern Frontend Apps</p>
        </div>
        <div class="cat-card glass-effect animate-fade-in" style="animation-delay: 0.4s;" onclick="openDifficulty('cyber')">
            <i class="fas fa-user-shield cat-icon" style="color: #ef4444;"></i>
            <h3>Cyber Security</h3>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-top: 10px;">Network & Data Protection</p>
        </div>
        <div class="cat-card glass-effect animate-fade-in" style="animation-delay: 0.5s;" onclick="openDifficulty('html')">
            <i class="fab fa-html5 cat-icon" style="color: #e34f26;"></i>
            <h3>HTML / CSS</h3>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-top: 10px;">Structure & Design</p>
        </div>
    </div>

    <!-- Difficulty Modal -->
    <div id="diff-modal" class="modal-overlay" style="display: none;">
        <div class="modal-card glass-effect">
            <h2 style="margin-bottom: 24px;">Select Difficulty</h2>
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <button class="btn btn-outline" onclick="startQuiz('easy')" style="border-left: 5px solid var(--success); justify-content: flex-start;">
                    Easy (15 Questions)
                </button>
                <button class="btn btn-outline" onclick="startQuiz('medium')" style="border-left: 5px solid var(--warning); justify-content: flex-start;">
                    Medium (20 Questions)
                </button>
                <button class="btn btn-outline" onclick="startQuiz('hard')" style="border-left: 5px solid var(--danger); justify-content: flex-start;">
                    Hard (25 Questions)
                </button>
            </div>
            <button class="btn btn-sm" onclick="closeModal()" style="margin-top: 24px; opacity: 0.6;">Cancel</button>
        </div>
    </div>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/shell.js"></script>
    <script>
        let selectedCat = '';
        function openDifficulty(cat) {
            selectedCat = cat;
            document.getElementById('diff-modal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('diff-modal').style.display = 'none';
        }
        function startQuiz(diff) {
            window.location.href = `quiz.html?category=${selectedCat}&difficulty=${diff}`;
        }
    </script>
</body>
</html>
