<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | QuizVerse</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-header {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 40px;
            padding: 40px;
            border-radius: var(--radius-lg);
        }
        .profile-avatar-large {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            background: var(--bg-dark);
        }
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 24px;
        }
        .info-card {
            padding: 30px;
            border-radius: var(--radius-lg);
            margin-bottom: 24px;
        }
        .badge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }
        .badge-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
        }
        .badge-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--warning);
        }
    </style>
</head>
<body class="bg-darker">
    <div class="profile-header glass-effect animate-fade-in">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="avatar" class="profile-avatar-large">
        <div>
            <h1 style="font-size: 3rem; margin-bottom: 8px;" id="profile-name">Warrior</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 20px;">Master Rank • Level 5</p>
            <div style="display: flex; gap: 12px;">
                <input type="file" id="avatar-input" style="display: none;" accept="image/*">
                <button class="btn btn-primary btn-sm" onclick="document.getElementById('avatar-input').click()">
                    <i class="fas fa-camera"></i> Edit Photo
                </button>
                <button class="btn btn-outline btn-sm" style="color: var(--danger); border-color: var(--danger);" onclick="deletePhoto()">
                    <i class="fas fa-trash"></i>
                </button>
                <button class="btn btn-outline btn-sm" onclick="shareProfile()">
                    <i class="fas fa-share-alt"></i> Share Stats
                </button>
            </div>
        </div>
    </div>

    <div class="profile-grid">
        <div class="left-col">
            <div class="info-card glass-effect animate-fade-in" style="animation-delay: 0.1s;">
                <h3 style="margin-bottom: 20px;">Statistics</h3>
                <div style="display: flex; flex-direction: column; gap: 16px;">
                    <div style="display: flex; justify-content: space-between;">
                        <span style="color: var(--text-muted);">Quizzes Completed</span>
                        <span style="font-weight: 700;">128</span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span style="color: var(--text-muted);">Win Rate</span>
                        <span style="font-weight: 700; color: var(--success);">74%</span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span style="color: var(--text-muted);">Global Rank</span>
                        <span style="font-weight: 700;">#452</span>
                    </div>
                </div>
            </div>

            <div class="info-card glass-effect animate-fade-in" style="animation-delay: 0.2s;">
                <h3 style="margin-bottom: 20px;">Badges</h3>
                <div class="badge-grid">
                    <div class="badge-item">
                        <div class="badge-icon"><i class="fas fa-fire"></i></div>
                        <span style="font-size: 0.7rem;">Streak Master</span>
                    </div>
                    <div class="badge-item">
                        <div class="badge-icon" style="color: var(--primary);"><i class="fas fa-shield-alt"></i></div>
                        <span style="font-size: 0.7rem;">Unstoppable</span>
                    </div>
                    <div class="badge-item">
                        <div class="badge-icon" style="color: var(--accent);"><i class="fas fa-bolt"></i></div>
                        <span style="font-size: 0.7rem;">Speedster</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="info-card glass-effect animate-fade-in" style="animation-delay: 0.3s;">
                <h3 style="margin-bottom: 20px;">Recent Activity</h3>
                <div style="display: flex; flex-direction: column; gap: 16px;">
                    <div style="padding: 16px; background: rgba(255,255,255,0.03); border-radius: var(--radius-md); display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <div style="font-weight: 700;">Won a Battle in JavaScript</div>
                            <div style="font-size: 0.8rem; color: var(--text-muted);">Against 3 opponents • +50 XP</div>
                        </div>
                        <span style="font-size: 0.8rem; color: var(--text-muted);">2 hours ago</span>
                    </div>
                    <div style="padding: 166px; background: rgba(255,255,255,0.03); border-radius: var(--radius-md); display: flex; justify-content: space-between; align-items: center; padding: 16px;">
                        <div>
                            <div style="font-weight: 700;">Achieved Level 5</div>
                            <div style="font-size: 0.8rem; color: var(--text-muted);">New Milestone Reached!</div>
                        </div>
                        <span style="font-size: 0.8rem; color: var(--text-muted);">Yesterday</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/firebase-config.js"></script>
    <script src="../js/shell.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
