<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | QuizVerse</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-darker">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
        <div>
            <h1 style="font-size: 2.5rem; margin-bottom: 8px;">Welcome back, <span id="user-name" class="text-gradient">Warrior</span>!</h1>
            <p style="color: var(--text-muted);">The arena is waiting for its next champion.</p>
        </div>
        <a href="profile.html" class="glass-effect" style="padding: 10px 20px; border-radius: 50px; display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; transition: all 0.3s;">
            <div style="text-align: right;">
                <div style="font-weight: 700; font-size: 0.9rem;" id="mini-name">Warrior</div>
                <div style="font-size: 0.75rem; color: var(--text-muted);">Elite Rank</div>
            </div>
            <img id="mini-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" style="width: 40px; height: 40px; border-radius: 50%; background: var(--dark);">
        </a>
    </div>

    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 40px;">
        <div class="glass-effect animate-fade-in" style="padding: 30px; border-radius: var(--radius-lg);">
            <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px;">TOTAL XP</div>
            <div style="font-size: 2.5rem; font-weight: 900;" id="user-xp">1,250</div>
        </div>
        <div class="glass-effect animate-fade-in" style="padding: 30px; border-radius: var(--radius-lg); animation-delay: 0.1s;">
            <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px;">QUIZ COINS</div>
            <div style="font-size: 2.5rem; font-weight: 900;" id="user-coins">500</div>
        </div>
        <div class="glass-effect animate-fade-in" style="padding: 30px; border-radius: var(--radius-lg); animation-delay: 0.2s;">
            <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px;">ARENA LEVEL</div>
            <div style="font-size: 2.5rem; font-weight: 900;" id="user-level">5</div>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
        <a href="categories.html" class="glass-effect animate-fade-in" style="padding: 40px; border-radius: var(--radius-lg); text-decoration: none; color: inherit; transition: all 0.3s; border-left: 6px solid var(--primary);">
            <h3 style="font-size: 1.5rem; margin-bottom: 10px;">Explore Quizzes</h3>
            <p style="color: var(--text-muted);">Master over 100 topics and earn XP.</p>
        </a>
        <a href="battle.html" class="glass-effect animate-fade-in" style="padding: 40px; border-radius: var(--radius-lg); text-decoration: none; color: inherit; transition: all 0.3s; border-left: 6px solid var(--accent); animation-delay: 0.1s;">
            <h3 style="font-size: 1.5rem; margin-bottom: 10px;">Battle Arena</h3>
            <p style="color: var(--text-muted);">Synchronized real-time multiplayer duels.</p>
        </a>
    </div>

    <!-- Scripts -->
    <script src="../js/firebase-config.js"></script>
    <script src="../js/shell.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('quizverse_user'));
            if (user) {
                document.getElementById('user-name').textContent = user.name || 'Warrior';
                document.getElementById('mini-name').textContent = user.name || 'Warrior';
                document.getElementById('user-xp').textContent = (user.xp || 0).toLocaleString();
                document.getElementById('user-coins').textContent = user.coins || 0;
                document.getElementById('user-level').textContent = user.level || 1;
                if (user.photoURL) document.getElementById('mini-avatar').src = user.photoURL;
            }
        });
    </script>
</body>
</html>
