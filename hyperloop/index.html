<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZWARTS | Premium Learning Arena</title>
    
    <!-- Fonts & Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/main.css">
    
    <style>
        .login-card { text-align: center; max-width: 440px; margin: 0 auto; position: relative; z-index: 10; animation: scaleIn 0.5s ease; }
        @keyframes scaleIn { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
        .login-logo { font-size: 3rem; color: var(--neon-cyan); margin-bottom: 16px; text-shadow: 0 0 20px rgba(0,243,255,0.5); }
        .login-header h1 { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 900; letter-spacing: 2px; margin-bottom: 8px; }
        
        .btn-google-fake { width: 100%; background: #fff; color: #000; font-weight: 700; border: none; }
        .btn-google-fake:hover { background: #f1f5f9; box-shadow: 0 0 15px rgba(255,255,255,0.3); transform: translateY(-2px); }
        
        .divider { display: flex; align-items: center; margin: 24px 0; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;}
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--panel-border); }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <canvas id="particle-canvas"></canvas>
    <div class="bg-orbs">
        <div class="neon-orb orb-1"></div>
        <div class="neon-orb orb-2"></div>
        <div class="neon-orb orb-3"></div>
    </div>

    <!-- Login Container -->
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div class="glass-panel login-card">
            <div class="login-header mb-4">
                <div class="login-logo"><i class="ph-fill ph-lightning"></i></div>
                <h1>QUIZWARTS</h1>
                <p class="text-muted">Enter the Ultimate Learning Arena</p>
            </div>
            
            <button class="btn-neon btn-google-fake" id="btn-show-google-modal">
                <i class="ph-fill ph-google-logo"></i> Sign in with Google
            </button>
            
            <div class="divider"><span>or</span></div>
            
            <div class="input-group">
                <label>Display Name</label>
                <input type="text" id="login-name" placeholder="Enter your username" autocomplete="off" maxlength="20">
            </div>
            <button class="btn-neon btn-primary w-full" id="btn-login-guest">Continue as Guest</button>
        </div>
    </div>

    <!-- Simulated Google Login Modal -->
    <div class="modal-overlay" id="google-login-modal">
        <div class="glass-modal text-center">
            <i class="ph-fill ph-google-logo" style="font-size:2rem;color:var(--neon-blue);margin-bottom:16px;"></i>
            <h3 class="font-orbitron mb-2">Sign in with Google</h3>
            <p class="text-muted mb-4">Choose an account to continue</p>
            
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="google-email" placeholder="you@gmail.com">
            </div>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="google-name" placeholder="Your Name">
            </div>
            
            <button class="btn-neon btn-primary w-full mt-4" id="btn-google-confirm">Sign In</button>
            <button class="btn-ghost w-full mt-2" id="btn-google-cancel">Cancel</button>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner-ring"></div>
        <p class="font-orbitron text-neon-cyan">Authenticating...</p>
    </div>

    <!-- Core Scripts -->
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // If already logged in, redirect to dashboard
            loadState();
            if(state.user) {
                window.location.href = 'dashboard.html';
            }

            const modal = document.getElementById('google-login-modal');

            document.getElementById('btn-show-google-modal').addEventListener('click', () => {
                sfxClick(); modal.classList.add('show');
            });
            document.getElementById('btn-google-cancel').addEventListener('click', () => {
                sfxClick(); modal.classList.remove('show');
            });

            function performLogin(name, email) {
                showLoading('Authenticating...');
                setTimeout(() => {
                    state.user = name || 'Guest Player';
                    state.email = email || 'guest@quizwarts.com';
                    checkBadges(); // Adds first_login badge, saves state
                    window.location.href = 'dashboard.html';
                }, 1200);
            }

            document.getElementById('btn-google-confirm').addEventListener('click', () => {
                sfxClick();
                const email = document.getElementById('google-email').value.trim() || 'user@gmail.com';
                const name = document.getElementById('google-name').value.trim() || email.split('@')[0];
                modal.classList.remove('show');
                performLogin(name, email);
            });

            document.getElementById('btn-login-guest').addEventListener('click', () => {
                sfxClick();
                const name = document.getElementById('login-name').value.trim();
                performLogin(name, 'guest@quizwarts.com');
            });
        });
    </script>
</body>
</html>
