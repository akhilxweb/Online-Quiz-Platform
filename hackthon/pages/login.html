<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QuizBattle</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Login Container -->
    <div class="auth-container">
        <div class="auth-card glass-effect">
            <!-- Logo -->
            <div class="auth-logo">
                <i class="fas fa-brain"></i>
                <h1>QuizBattle</h1>
            </div>

            <!-- Form Title -->
            <div class="form-title">
                <h2>Welcome Back</h2>
                <p>Sign in to your account and continue competing</p>
            </div>

            <!-- Login Form -->
            <form class="auth-form" id="loginForm">
                <!-- Email -->
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Email Address
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        placeholder="you@example.com"
                        required
                    >
                    <span class="form-error" id="emailError"></span>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <div class="password-input-group">
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            placeholder="Enter your password"
                            required
                        >
                        <i class="fas fa-eye toggle-password" data-target="password"></i>
                    </div>
                    <span class="form-error" id="passwordError"></span>
                </div>

                <!-- Remember Me -->
                <div class="form-checkbox">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary btn-lg btn-submit">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Divider -->
            <div class="form-divider">
                <span>Or continue with</span>
            </div>

            <!-- Social Login -->
            <div class="social-login">
                <button class="social-btn google" title="Sign in with Google">
                    <i class="fab fa-google"></i>
                </button>
                <button class="social-btn github" title="Sign in with GitHub">
                    <i class="fab fa-github"></i>
                </button>
                <button class="social-btn discord" title="Sign in with Discord">
                    <i class="fab fa-discord"></i>
                </button>
            </div>

            <!-- Sign Up Link -->
            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Sign up here</a></p>
                <a href="../index.html" class="back-link">
                    <i class="fas fa-arrow-left"></i>
                    Back to home
                </a>
            </div>
        </div>

        <!-- Floating Element -->
        <div class="floating-shape"></div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
